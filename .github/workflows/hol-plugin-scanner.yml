name: HOL Plugin Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@9f5d6a01812f3f2ba33762a13bf5d3a0137e94d1 # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: json
          output: scan-report.json
          write_step_summary: true
      - name: Show high findings
        if: always()
        run: |
          python3 - <<'PY'
          import json
          data = json.load(open('scan-report.json'))
          def walk(node):
              if isinstance(node, dict):
                  sev = str(node.get('severity', '')).lower()
                  if 'high' in sev or 'critical' in sev:
                      print(sev, '|', node.get('rule_id') or node.get('ruleId') or node.get('title'),
                            '|', node.get('file_path') or node.get('filePath') or node.get('location'),
                            '|', str(node.get('description'))[:200])
                  for value in node.values():
                      walk(value)
              elif isinstance(node, list):
                  for item in node:
                      walk(item)
          walk(data)
          PY

