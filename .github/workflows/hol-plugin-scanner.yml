name: HOL Plugin Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@9f5d6a01812f3f2ba33762a13bf5d3a0137e94d1 # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
